name: Fetch C2 Data

# Runs every 6 hours. Feodo Tracker updates several times per day
# so this is frequent enough to stay current without hammering the source.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.CLUDESAPP_ID }}
          private-key: ${{ secrets.CLUDESAPP_PEM }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name  "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ secrets.CLUDESAPP_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Fetch C2 data
        run: node .github/scripts/fetch-live.js

      - name: Commit and push
        run: |
          git add data/live.json
          git diff --staged --quiet || git commit -m "chore: update C2 data [skip ci]"
          git push
